name: Deploy Client

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH → pull & rebuild client container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.PROJECT_DIR }}
            git pull origin main
            docker stop altuva-client || true
            docker rm altuva-client || true
            docker build -f Dockerfile.prebuilt -t altuva-client .
            docker run -d --name altuva-client -p 5173:80 --restart unless-stopped altuva-client
