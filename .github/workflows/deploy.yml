name: Build & Deploy React App (PROD)

on:
  push:
    branches:
      - main # Only runs when code is pushed to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Checkout Code
        uses: actions/checkout@v3

      - name: 🧰 Setup Node.js 22
        uses: actions/setup-node@v3
        with:
          node-version: 22.14 # ✅ Node.js v22

      - name: 📦 Install Dependencies
        run: npm i

      - name: 🏗️ Build React (PROD Config)
        run: npm run build

      - name: 🚚 Deploy dist/ to CWP Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ vars.SSH_HOST }}
          port: ${{ vars.SSH_PORT }}
          username: ${{ vars.SSH_USER }}
          key: ${{ vars.SSH_KEY }}
          source: "dist/**"
          target: "${{ vars.PROJECT_DIR }}"
          strip_components: 2
          rm: true # Remove files in target directory before copying